services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: x-bot:latest
    command: ["/app/.venv/bin/python", "main.py"]
    env_file:
      - config/.env
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    shm_size: "1gb"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://127.0.0.1:8790/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: x-bot:latest
    command:
      [
        "/app/.venv/bin/uvicorn",
        "src.web.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    env_file:
      - config/.env
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://127.0.0.1:8000/login",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
