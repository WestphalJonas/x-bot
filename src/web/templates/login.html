<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000" id="theme-color-meta">
    <meta name="color-scheme" content="dark light">
    <title>Login - X Bot</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    
    <!-- Custom styles -->
    <link rel="stylesheet" href="/static/build.css">
    <script defer src="/static/js/alpine-init.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
    
    <!-- Theme initialization (prevent flash) -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 
                (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('theme-color-meta').content = theme === 'dark' ? '#000000' : '#ffffff';
        })();
    </script>
    
</head>
<body x-data="loginPage()" x-init="init()" class="xb-shell antialiased">
    <div class="login-page xb-login-page flex items-center justify-center">
        <div class="flex w-full max-w-md flex-col items-center">
        <a href="/" class="login-logo mb-8 flex items-center gap-3 no-underline">
            <span class="login-logo-icon">𝕏</span>
            <span class="login-logo-text">Bot</span>
        </a>
        
        <div class="login-card xb-login-card">
            <div class="login-header px-6 pb-0 pt-6 text-center">
                <h1 class="login-title text-2xl font-bold tracking-tight">Welcome back</h1>
                <p class="login-subtitle mt-2 text-sm text-[var(--xb-text-muted)]">Sign in to access the dashboard</p>
            </div>
            
            <form method="post" action="/login" class="login-form flex flex-col gap-4 p-6">
                <input type="hidden" name="next_path" value="{{ next_path }}">
                
                {% if error %}
                <div class="login-error rounded-xl border border-red-500/30 bg-red-500/10 px-3 py-3 text-red-400">
                    <svg class="login-error-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm-1-7v2h2v-2h-2zm0-8v6h2V7h-2z"/>
                    </svg>
                    <span>Invalid username or password</span>
                </div>
                {% endif %}
                
                <div class="form-group">
                    <label class="form-label mb-1 block text-sm font-medium" for="username">Username</label>
                    <input 
                        class="form-input xb-input" 
                        id="username" 
                        name="username" 
                        type="text" 
                        autocomplete="username" 
                        placeholder="Enter your username"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label mb-1 block text-sm font-medium" for="password">Password</label>
                    <input 
                        class="form-input xb-input" 
                        id="password" 
                        name="password" 
                        type="password" 
                        autocomplete="current-password" 
                        placeholder="Enter your password"
                        required
                    >
                </div>
                
                <div class="login-submit">
                    <button type="submit" class="btn btn-primary xb-btn xb-btn-primary w-full">Sign in</button>
                </div>
            </form>
            
            <div class="login-footer border-t border-[var(--xb-border)] px-6 py-4">
                <button class="theme-toggle-login xb-btn h-10 w-10 p-0" id="theme-toggle-login" aria-label="Toggle theme" @click.prevent="toggleTheme()">
                    <span class="icon-sun">☀️</span>
                    <span class="icon-moon">🌙</span>
                </button>
            </div>
        </div>
        </div>
    </div>
    
</body>
</html>
