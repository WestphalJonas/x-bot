{% extends "base.html" %}

{% block title %}Posts - X Bot{% endblock %}
{% block page_title %}Posts{% endblock %}

{% block content %}
<div class="posts-container" x-data='postsPage({{ active_tab | tojson }})'>
    <!-- Tabs Navigation -->
    <div class="posts-header">
        <div class="tabs">
            <button class="tab {% if active_tab == 'read' %}active{% endif %}"
                    :class="{ 'active': activeTab === 'read' }"
                    hx-get="/partials/posts/read" 
                    hx-target="#posts-content"
                    hx-swap="innerHTML"
                    @click="setActiveTab('read')">
                Read
            </button>
            <button class="tab {% if active_tab == 'interested' %}active{% endif %}"
                    :class="{ 'active': activeTab === 'interested' }"
                    hx-get="/partials/posts/interested" 
                    hx-target="#posts-content"
                    hx-swap="innerHTML"
                    @click="setActiveTab('interested')">
                Interested
            </button>
            <button class="tab {% if active_tab == 'written' %}active{% endif %}"
                    :class="{ 'active': activeTab === 'written' }"
                    hx-get="/partials/posts/written" 
                    hx-target="#posts-content"
                    hx-swap="innerHTML"
                    @click="setActiveTab('written')">
                Written
            </button>
            <button class="tab {% if active_tab == 'rejected' %}active{% endif %}"
                    :class="{ 'active': activeTab === 'rejected' }"
                    hx-get="/partials/posts/rejected" 
                    hx-target="#posts-content"
                    hx-swap="innerHTML"
                    @click="setActiveTab('rejected')">
                Rejected
            </button>
        </div>
    </div>
    
    <!-- Content area -->
    <div id="posts-content" class="posts-content"
         hx-get="/partials/posts/{{ active_tab }}"
         hx-trigger="load, every 30s, refresh"
         hx-swap="innerHTML">
        <div class="loading">
            <div class="loading-spinner"></div>
            <span>Loading posts...</span>
        </div>
    </div>
</div>

{% endblock %}
